<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>نظام الجداول التدريبية</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',Tahoma,Arial,sans-serif; direction:rtl; background:#0C4A6E; }
    #loading {
      display:flex; align-items:center; justify-content:center;
      min-height:100vh; flex-direction:column; gap:16px; color:white;
    }
    .sp {
      width:48px; height:48px; border:5px solid #A5F3FC44;
      border-top-color:#A5F3FC; border-radius:50%;
      animation:spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="sp"></div>
    <div style="font-size:18px">نظام الجداول التدريبية</div>
    <div style="font-size:13px;color:#A5F3FC">جاري التحميل...</div>
  </div>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script>
    if(typeof React !== 'undefined') {
      document.getElementById('loading').style.display = 'none';
      document.body.style.background = '#F0FDFA';
    }
  </script>
  <script src="app.js"></script>
</body>
</html>
